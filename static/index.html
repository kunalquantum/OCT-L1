<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CephMind — Distributed AI Reasoning</title>
<style>
/* ── reset & tokens ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #060b18;
  --surface:   #0d1526;
  --surface2:  #111e35;
  --border:    #1e2f4a;
  --text:      #e2eaf6;
  --muted:     #7a92b4;
  --accent:    #38bdf8;
  --accent2:   #818cf8;

  --proceed:   #10b981;
  --caution:   #f59e0b;
  --delay:     #f97316;
  --block:     #ef4444;

  --radius:    14px;
  --transition: 0.35s cubic-bezier(.4,0,.2,1);
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── background glow ─────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(56,189,248,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(129,140,248,.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── layout ──────────────────────────────────────────────────────── */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* ── header ──────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 40px 0 32px;
}

.logo-wrap {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #0ea5e9, #818cf8);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 28px rgba(56,189,248,.35);
}

.logo-wrap svg { width: 28px; height: 28px; }

header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -.5px;
  background: linear-gradient(90deg, #e2eaf6 0%, #38bdf8 60%, #818cf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  font-size: .82rem;
  color: var(--muted);
  margin-top: 2px;
}

/* ── query panel ─────────────────────────────────────────────────── */
.query-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
}

.query-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.field-group label {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}

textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: .95rem;
  line-height: 1.55;
  padding: 14px 16px;
  resize: vertical;
  min-height: 110px;
  width: 100%;
  transition: border-color var(--transition);
  font-family: inherit;
}

textarea:focus { outline: none; border-color: var(--accent); }

.side-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 160px;
}

select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: .9rem;
  padding: 11px 14px;
  cursor: pointer;
  transition: border-color var(--transition);
  font-family: inherit;
}

select:focus { outline: none; border-color: var(--accent); }

.btn-reason {
  background: linear-gradient(135deg, #0ea5e9, #818cf8);
  border: none;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .03em;
  padding: 13px 20px;
  transition: opacity var(--transition), transform var(--transition);
  white-space: nowrap;
  font-family: inherit;
}

.btn-reason:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn-reason:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.examples {
  margin-top: 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.examples span {
  font-size: .75rem;
  color: var(--muted);
}

.chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--accent);
  cursor: pointer;
  font-size: .75rem;
  padding: 4px 12px;
  transition: background var(--transition), border-color var(--transition);
  font-family: inherit;
}

.chip:hover { background: rgba(56,189,248,.1); border-color: var(--accent); }

/* ── loader ──────────────────────────────────────────────────────── */
#loader {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 60px 0;
}

#loader.active { display: flex; }

.tentacles {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  height: 36px;
}

.tentacle {
  width: 6px;
  border-radius: 3px;
  background: var(--accent);
  animation: wave 1.2s ease-in-out infinite;
}

.tentacle:nth-child(1) { height: 20px; animation-delay: 0s;    background: #38bdf8; }
.tentacle:nth-child(2) { height: 32px; animation-delay: .1s;   background: #60a5fa; }
.tentacle:nth-child(3) { height: 26px; animation-delay: .2s;   background: #818cf8; }
.tentacle:nth-child(4) { height: 36px; animation-delay: .3s;   background: #a78bfa; }
.tentacle:nth-child(5) { height: 28px; animation-delay: .4s;   background: #818cf8; }
.tentacle:nth-child(6) { height: 34px; animation-delay: .5s;   background: #60a5fa; }
.tentacle:nth-child(7) { height: 22px; animation-delay: .6s;   background: #38bdf8; }
.tentacle:nth-child(8) { height: 30px; animation-delay: .7s;   background: #818cf8; }

@keyframes wave {
  0%, 100% { transform: scaleY(1); }
  50%       { transform: scaleY(.35); }
}

#loader p { color: var(--muted); font-size: .9rem; letter-spacing: .05em; }

/* ── results ─────────────────────────────────────────────────────── */
#results { display: none; }
#results.active { display: block; }

.section-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  margin-bottom: 16px;
}

/* ── agent grid ──────────────────────────────────────────────────── */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(296px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  opacity: 0;
  transform: translateY(16px);
  animation: cardIn var(--transition) forwards;
  position: relative;
  overflow: hidden;
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}

.agent-card[data-stance="PROCEED"]::before  { background: var(--proceed); }
.agent-card[data-stance="CAUTION"]::before  { background: var(--caution); }
.agent-card[data-stance="DELAY"]::before    { background: var(--delay); }
.agent-card[data-stance="BLOCK"]::before    { background: var(--block); }

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

.agent-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.agent-name {
  font-size: .88rem;
  font-weight: 600;
  color: var(--text);
}

.stance-badge {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  border-radius: 6px;
  padding: 3px 8px;
}

.badge-PROCEED { background: rgba(16,185,129,.15); color: #34d399; }
.badge-CAUTION { background: rgba(245,158,11,.15); color: #fbbf24; }
.badge-DELAY   { background: rgba(249,115,22,.15); color: #fb923c; }
.badge-BLOCK   { background: rgba(239,68,68,.15);  color: #f87171; }

.conf-bar-wrap {
  margin-bottom: 10px;
}

.conf-label {
  display: flex;
  justify-content: space-between;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: 4px;
}

.conf-bar-track {
  background: var(--surface2);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
}

.conf-bar-fill {
  height: 100%;
  border-radius: 4px;
  width: 0;
  transition: width 0.9s cubic-bezier(.4,0,.2,1);
}

[data-stance="PROCEED"] .conf-bar-fill  { background: var(--proceed); }
[data-stance="CAUTION"] .conf-bar-fill  { background: var(--caution); }
[data-stance="DELAY"]   .conf-bar-fill  { background: var(--delay); }
[data-stance="BLOCK"]   .conf-bar-fill  { background: var(--block); }

.agent-summary {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 10px;
}

.findings-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.findings-list li {
  font-size: .76rem;
  color: #8faabb;
  display: flex;
  gap: 6px;
  align-items: flex-start;
}

.findings-list li::before { content: '·'; color: var(--muted); flex-shrink: 0; }

.blockers-list { margin-top: 8px; }

.blocker-item {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  font-size: .76rem;
  color: #fca5a5;
  margin-top: 4px;
}

.blocker-item::before { content: '✖'; flex-shrink: 0; font-size: .7rem; margin-top: 1px; }

/* ── consensus panel ─────────────────────────────────────────────── */
.consensus-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  opacity: 0;
  animation: cardIn .4s .5s forwards;
}

.consensus-top {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

/* radial meter */
.meter-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.meter-label {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
}

.radial {
  position: relative;
  width: 100px;
  height: 100px;
}

.radial svg {
  transform: rotate(-90deg);
  width: 100px; height: 100px;
}

.radial-track { fill: none; stroke: var(--surface2); stroke-width: 8; }
.radial-fill  { fill: none; stroke-width: 8; stroke-linecap: round;
                stroke-dasharray: 251.2; stroke-dashoffset: 251.2;
                transition: stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1); }

.radial-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.radial-pct {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.radial-sub {
  font-size: .62rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .07em;
}

.consensus-meta {
  flex: 1;
  min-width: 220px;
}

.consensus-stance-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.consensus-stance-label {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

.consensus-stance-badge {
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .08em;
  border-radius: 8px;
  padding: 4px 12px;
}

.recommendation-text {
  font-size: .88rem;
  line-height: 1.6;
  color: var(--muted);
  margin-bottom: 12px;
}

.reliability-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: .8rem;
  color: var(--muted);
}

.reliability-bar-track {
  flex: 1;
  background: var(--surface2);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
}

.reliability-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #818cf8, #38bdf8);
  width: 0;
  transition: width 1.1s .3s cubic-bezier(.4,0,.2,1);
}

.reliability-val {
  font-weight: 600;
  color: var(--text);
  min-width: 36px;
  text-align: right;
}

/* consensus blockers */
.consensus-blockers { margin-top: 20px; }

.consensus-blockers-title {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #f87171;
  margin-bottom: 10px;
}

.consensus-blocker {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  background: rgba(239,68,68,.06);
  border: 1px solid rgba(239,68,68,.18);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: .82rem;
  color: #fca5a5;
  line-height: 1.5;
}

.consensus-blocker::before { content: '⚠'; flex-shrink: 0; }

/* dissenters */
.dissenters {
  margin-top: 16px;
  font-size: .78rem;
  color: var(--muted);
}

.dissenters strong { color: var(--text); }

/* ── error banner ────────────────────────────────────────────────── */
#error-banner {
  display: none;
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.3);
  border-radius: 10px;
  color: #fca5a5;
  font-size: .88rem;
  padding: 14px 18px;
  margin-bottom: 24px;
}

#error-banner.active { display: block; }

/* ── responsive ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .query-row { flex-direction: column; }
  .side-controls { min-width: unset; flex-direction: row; flex-wrap: wrap; }
  .side-controls select { flex: 1; }
  .side-controls .btn-reason { flex: 1; }
  header h1 { font-size: 1.4rem; }
}
</style>
</head>
<body>
<div class="wrapper">

  <!-- header -->
  <header>
    <div class="logo-wrap">
      <!-- stylised octopus / brain hybrid icon -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="13" r="7" fill="white" opacity=".9"/>
        <!-- tentacles -->
        <path d="M9 19 Q6 23 7 27" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <path d="M11 21 Q10 26 12 28" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <path d="M16 22 Q16 27 16 29" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <path d="M21 21 Q22 26 20 28" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <path d="M23 19 Q26 23 25 27" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".8"/>
        <!-- eyes -->
        <circle cx="13.5" cy="12.5" r="1.5" fill="#0ea5e9"/>
        <circle cx="18.5" cy="12.5" r="1.5" fill="#818cf8"/>
      </svg>
    </div>
    <div>
      <h1>CephMind</h1>
      <p>Distributed AI reasoning — multiple agents collaborate before answering</p>
    </div>
  </header>

  <!-- query card -->
  <div class="query-card">
    <div class="query-row">
      <div class="field-group">
        <label for="query-input">Decision or question</label>
        <textarea id="query-input" placeholder="e.g. Should this Oracle ERP migration proceed? UAT incomplete, no rollback plan, go-live in 6 weeks…"></textarea>
      </div>
      <div class="side-controls">
        <div class="field-group">
          <label for="domain-select">Domain</label>
          <select id="domain-select">
            <option value="general">General</option>
            <option value="erp">ERP</option>
            <option value="cloud">Cloud</option>
            <option value="finance">Finance</option>
          </select>
        </div>
        <button class="btn-reason" id="btn-reason">Analyse →</button>
      </div>
    </div>

    <div class="examples">
      <span>Try:</span>
      <button class="chip" onclick="loadExample('erp_risk')">ERP migration (risky)</button>
      <button class="chip" onclick="loadExample('cloud_good')">Cloud migration (good)</button>
      <button class="chip" onclick="loadExample('finance')">Budget approval</button>
    </div>
  </div>

  <!-- error banner -->
  <div id="error-banner"></div>

  <!-- loader -->
  <div id="loader">
    <div class="tentacles">
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
      <div class="tentacle"></div>
    </div>
    <p>Agents reasoning in parallel…</p>
  </div>

  <!-- results -->
  <div id="results">
    <p class="section-title">Agent Verdicts</p>
    <div class="agent-grid" id="agent-grid"></div>

    <p class="section-title">Consensus</p>
    <div class="consensus-panel" id="consensus-panel"></div>
  </div>

</div>

<script>
const EXAMPLES = {
  erp_risk: {
    domain: 'erp',
    text: 'Should this Oracle ERP migration proceed? The project has a fixed go-live in 6 weeks. UAT is still incomplete, there is no rollback plan, budget is over budget by 20%, data migration scripts are untested in production, dependency on a single legacy interface, and GDPR controls are not yet reviewed by the DPO.',
  },
  cloud_good: {
    domain: 'cloud',
    text: 'Should we proceed with the AWS cloud migration? All workloads are containerised using Kubernetes. Terraform IaC is in place, CI/CD pipeline tested, blue-green deployment confirmed, DR and failover validated in staging, encryption at rest and in transit enforced, least-privilege IAM policies reviewed. Budget approved, TCO model signed off by CFO.',
  },
  finance: {
    domain: 'finance',
    text: 'Should we approve the $2 million capital expenditure for the new data platform? No business case has been prepared, costs are unknown, and there is no approved budget or CFO sign-off.',
  },
};

function loadExample(key) {
  const ex = EXAMPLES[key];
  document.getElementById('query-input').value = ex.text;
  document.getElementById('domain-select').value = ex.domain;
}

function stanceColor(s) {
  return { PROCEED:'#10b981', CAUTION:'#f59e0b', DELAY:'#f97316', BLOCK:'#ef4444' }[s] || '#7a92b4';
}

function pct(n) { return Math.round(n * 100) + '%'; }

function buildAgentCard(v, idx) {
  const delay = idx * 0.07;
  const card = document.createElement('div');
  card.className = 'agent-card';
  card.dataset.stance = v.stance;
  card.style.animationDelay = delay + 's';

  const findings = v.findings.map(f => `<li>${f}</li>`).join('');
  const blockers = v.blockers.map(b => `<div class="blocker-item">${b}</div>`).join('');

  card.innerHTML = `
    <div class="agent-header">
      <span class="agent-name">${v.agent_name}</span>
      <span class="stance-badge badge-${v.stance}">${v.stance}</span>
    </div>
    <div class="conf-bar-wrap">
      <div class="conf-label"><span>Confidence</span><span>${pct(v.confidence)}</span></div>
      <div class="conf-bar-track"><div class="conf-bar-fill" data-width="${v.confidence * 100}"></div></div>
    </div>
    <p class="agent-summary">${v.summary}</p>
    ${findings ? `<ul class="findings-list">${findings}</ul>` : ''}
    ${blockers ? `<div class="blockers-list">${blockers}</div>` : ''}
  `;
  return card;
}

function buildConsensus(data) {
  const c = data.consensus;
  const rel = data.reliability_score;
  const color = stanceColor(c.overall_stance);
  const circumference = 251.2;
  const offset = circumference * (1 - c.confidence_score);

  const blockerHtml = c.major_blockers.length
    ? `<div class="consensus-blockers">
        <div class="consensus-blockers-title">Major Blockers</div>
        ${c.major_blockers.map(b => `<div class="consensus-blocker">${b}</div>`).join('')}
      </div>`
    : '';

  const dissentersHtml = c.dissenting_agents.length
    ? `<div class="dissenters">Dissenting agents: <strong>${c.dissenting_agents.join(', ')}</strong></div>`
    : '';

  const panel = document.getElementById('consensus-panel');
  panel.innerHTML = `
    <div class="consensus-top">
      <div class="meter-wrap">
        <div class="meter-label">Confidence</div>
        <div class="radial">
          <svg viewBox="0 0 100 100">
            <circle class="radial-track" cx="50" cy="50" r="40"/>
            <circle class="radial-fill" cx="50" cy="50" r="40"
              style="stroke:${color}; stroke-dashoffset:${circumference};"
              data-offset="${offset}"/>
          </svg>
          <div class="radial-text">
            <span class="radial-pct">${pct(c.confidence_score)}</span>
            <span class="radial-sub">conf</span>
          </div>
        </div>
      </div>

      <div class="consensus-meta">
        <div class="consensus-stance-row">
          <span class="consensus-stance-label">Consensus</span>
          <span class="consensus-stance-badge badge-${c.overall_stance}">${c.overall_stance}</span>
        </div>
        <p class="recommendation-text">${c.recommendation}</p>
        <div class="reliability-row">
          <span>Reliability</span>
          <div class="reliability-bar-track">
            <div class="reliability-bar-fill" data-width="${rel * 100}"></div>
          </div>
          <span class="reliability-val">${pct(rel)}</span>
        </div>
      </div>
    </div>
    ${blockerHtml}
    ${dissentersHtml}
  `;
}

function animateBars() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.conf-bar-fill').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
    document.querySelectorAll('.reliability-bar-fill').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
    document.querySelectorAll('.radial-fill').forEach(el => {
      el.style.strokeDashoffset = el.dataset.offset;
    });
  });
}

async function runReason() {
  const text = document.getElementById('query-input').value.trim();
  const domain = document.getElementById('domain-select').value;
  if (!text) return;

  const btn = document.getElementById('btn-reason');
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');
  const errorBanner = document.getElementById('error-banner');

  btn.disabled = true;
  loader.classList.add('active');
  results.classList.remove('active');
  errorBanner.classList.remove('active');
  document.getElementById('agent-grid').innerHTML = '';

  try {
    const res = await fetch('/api/reason', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, domain }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || res.statusText);
    }

    const data = await res.json();

    // render agent cards
    const grid = document.getElementById('agent-grid');
    data.verdicts.forEach((v, i) => grid.appendChild(buildAgentCard(v, i)));

    // render consensus
    buildConsensus(data);

    results.classList.add('active');

    // trigger animations after a frame
    setTimeout(animateBars, 50);

  } catch (e) {
    errorBanner.textContent = 'Error: ' + e.message;
    errorBanner.classList.add('active');
  } finally {
    loader.classList.remove('active');
    btn.disabled = false;
  }
}

document.getElementById('btn-reason').addEventListener('click', runReason);
document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runReason();
});
</script>
</body>
</html>
