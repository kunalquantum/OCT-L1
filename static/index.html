<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CephMind</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04091a;
  --s1:#080f22;
  --s2:#0b1428;
  --border:rgba(255,255,255,.07);
  --text:#dde8f8;
  --muted:#5a7394;
  --acc:#38bdf8;
  --acc2:#818cf8;
  --pro:#10b981;
  --cau:#f59e0b;
  --del:#f97316;
  --blk:#ef4444;
  --r:14px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ambient bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(56,189,248,.06) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(129,140,248,.05) 0%,transparent 65%),
    radial-gradient(ellipse 30% 30% at 50% 50%,rgba(16,185,129,.03) 0%,transparent 70%);
}

.page{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:0 24px 120px}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:16px;padding:36px 0 30px}
.logo{
  width:50px;height:50px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(140deg,#0ea5e9 0%,#818cf8 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 32px rgba(56,189,248,.28),0 0 64px rgba(56,189,248,.1);
}
.logo svg{width:28px;height:28px}
.htext h1{
  font-size:1.7rem;font-weight:800;letter-spacing:-.6px;
  background:linear-gradient(95deg,#e8f2ff 0%,#38bdf8 50%,#818cf8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.htext p{font-size:.8rem;color:var(--muted);margin-top:4px;line-height:1.5;max-width:560px}
.htext p em{color:#6ba3bf;font-style:normal;font-weight:500}

/* ── QUERY ── */
.qbox{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:22px;margin-bottom:24px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
}
.qrow{display:flex;gap:12px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:6px;flex:1}
.fg label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
textarea{
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.93rem;line-height:1.6;
  padding:13px 16px;resize:vertical;min-height:96px;width:100%;
  transition:border-color .25s;
}
textarea:focus{outline:none;border-color:rgba(56,189,248,.5)}
.qside{display:flex;flex-direction:column;gap:10px;min-width:150px}
select{
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.88rem;padding:11px 14px;cursor:pointer;
}
select:focus{outline:none;border-color:rgba(56,189,248,.4)}
.btn{
  background:linear-gradient(135deg,#0ea5e9,#818cf8);
  border:none;border-radius:10px;color:#fff;cursor:pointer;
  font-family:inherit;font-size:.9rem;font-weight:700;letter-spacing:.04em;
  padding:13px;transition:opacity .2s,transform .2s;
}
.btn:hover:not(:disabled){opacity:.82;transform:translateY(-1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

.chips{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.chips span{font-size:.72rem;color:var(--muted)}
.chip{
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;
  color:var(--acc);cursor:pointer;font-family:inherit;font-size:.72rem;padding:4px 11px;
  transition:background .2s,border-color .2s;
}
.chip:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.4)}

/* ── LOADER ── */
#loader{display:none;flex-direction:column;align-items:center;gap:20px;padding:72px 0}
#loader.on{display:flex}
.arms{display:flex;gap:6px;align-items:flex-end;height:44px}
.arm{width:6px;border-radius:3px;animation:pulse 1.1s ease-in-out infinite}
.arm:nth-child(1){height:20px;animation-delay:0s;   background:linear-gradient(#38bdf8,#0ea5e9)}
.arm:nth-child(2){height:34px;animation-delay:.12s; background:linear-gradient(#60a5fa,#3b82f6)}
.arm:nth-child(3){height:26px;animation-delay:.24s; background:linear-gradient(#818cf8,#6366f1)}
.arm:nth-child(4){height:40px;animation-delay:.36s; background:linear-gradient(#a78bfa,#8b5cf6)}
.arm:nth-child(5){height:28px;animation-delay:.48s; background:linear-gradient(#818cf8,#6366f1)}
.arm:nth-child(6){height:36px;animation-delay:.60s; background:linear-gradient(#60a5fa,#3b82f6)}
.arm:nth-child(7){height:22px;animation-delay:.72s; background:linear-gradient(#38bdf8,#0ea5e9)}
.arm:nth-child(8){height:32px;animation-delay:.84s; background:linear-gradient(#818cf8,#6366f1)}
@keyframes pulse{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.25)}}
.loader-t{color:var(--muted);font-size:.88rem;letter-spacing:.07em}
.loader-s{color:#2a3d56;font-size:.74rem;letter-spacing:.05em}

/* ── ERROR ── */
#err{
  display:none;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);
  border-radius:10px;color:#fca5a5;font-size:.85rem;padding:13px 18px;margin-bottom:20px
}
#err.on{display:block}

/* ── RESULTS ── */
#results{display:none}
#results.on{display:block}

.sec-head{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:32px;
}
.sec-head span{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── NETWORK PANEL ── */
#net-panel{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:24px 20px 20px;overflow:hidden;
  box-shadow:0 8px 48px rgba(0,0,0,.55);
}
#net-svg-wrap{overflow-x:auto;scrollbar-width:none}
#net-svg-wrap::-webkit-scrollbar{display:none}
#net-svg-wrap svg{display:block;min-width:520px;width:100%}

/* svg path draw animation */
.npath{
  fill:none;stroke-width:1.8;
  stroke-dasharray:500;stroke-dashoffset:500;
  transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);
}
.npath.lit{stroke-dashoffset:0}

/* ── DISTRIBUTION STRIP ── */
#dist-strip{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;padding-top:18px;
  border-top:1px solid var(--border);
}
.dst{
  display:flex;align-items:center;gap:8px;flex:1;min-width:100px;
  background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 13px;
}
.dst-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dst-info{display:flex;flex-direction:column;gap:1px}
.dst-stance{font-size:.68rem;font-weight:800;letter-spacing:.07em}
.dst-n{font-size:.72rem;color:var(--muted)}
.dst.p .dst-dot{background:var(--pro)}.dst.p .dst-stance{color:#34d399}
.dst.c .dst-dot{background:var(--cau)}.dst.c .dst-stance{color:#fbbf24}
.dst.d .dst-dot{background:var(--del)}.dst.d .dst-stance{color:#fb923c}
.dst.b .dst-dot{background:var(--blk)}.dst.b .dst-stance{color:#f87171}

.rel-callout{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--s2);border:1px solid var(--border);border-radius:9px;
  padding:9px 20px;gap:1px;min-width:115px;
}
.rel-n{
  font-size:1.6rem;font-weight:900;
  background:linear-gradient(90deg,var(--acc2),var(--acc));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.rel-lbl{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.rel-hint{font-size:.63rem;color:#2a3d56;text-align:center;max-width:90px;line-height:1.35;margin-top:1px}

/* ── AGENT CARDS ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:12px;
}

.acard{
  background:var(--s1);border-radius:var(--r);
  padding:18px 20px;
  opacity:0;transform:translateY(18px);
  animation:fadeUp .4s forwards;
  position:relative;overflow:hidden;
  border:1px solid var(--border);
  transition:border-color .25s,box-shadow .25s;
}
.acard:hover{
  border-color:rgba(255,255,255,.13);
  box-shadow:0 6px 32px rgba(0,0,0,.45);
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* coloured left accent bar */
.acard::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r);
}
.acard[data-s="PROCEED"]::before{background:var(--pro)}
.acard[data-s="CAUTION"]::before{background:var(--cau)}
.acard[data-s="DELAY"]::before{background:var(--del)}
.acard[data-s="BLOCK"]::before{background:var(--blk)}

/* subtle stance tint */
.acard[data-s="PROCEED"]{background:linear-gradient(135deg,rgba(16,185,129,.04) 0%,var(--s1) 50%)}
.acard[data-s="CAUTION"]{background:linear-gradient(135deg,rgba(245,158,11,.04) 0%,var(--s1) 50%)}
.acard[data-s="DELAY"]  {background:linear-gradient(135deg,rgba(249,115,22,.04) 0%,var(--s1) 50%)}
.acard[data-s="BLOCK"]  {background:linear-gradient(135deg,rgba(239,68,68,.05) 0%,var(--s1) 50%)}

.acard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.aname{font-size:.87rem;font-weight:700;color:var(--text)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:.62rem;font-weight:800;letter-spacing:.07em;border-radius:5px;padding:2px 7px}
.tp{background:rgba(16,185,129,.13);color:#34d399}
.tc{background:rgba(245,158,11,.13);color:#fbbf24}
.td{background:rgba(249,115,22,.13);color:#fb923c}
.tb{background:rgba(239,68,68,.13);color:#f87171}

/* circular confidence */
.cconf{position:relative;width:52px;height:52px;flex-shrink:0}
.cconf svg{transform:rotate(-90deg)}
.cconf-track{fill:none;stroke:var(--s2);stroke-width:5}
.cconf-fill{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:125.6;stroke-dashoffset:125.6;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)}
.cconf-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.cconf-pct{font-size:.7rem;font-weight:800;color:var(--text);line-height:1}
.cconf-sub{font-size:.52rem;color:var(--muted);line-height:1}

[data-s="PROCEED"] .cconf-fill{stroke:var(--pro)}
[data-s="CAUTION"] .cconf-fill{stroke:var(--cau)}
[data-s="DELAY"]   .cconf-fill{stroke:var(--del)}
[data-s="BLOCK"]   .cconf-fill{stroke:var(--blk)}

/* align badge */
.abadge{font-size:.6rem;font-weight:700;letter-spacing:.06em;border-radius:5px;padding:2px 7px}
.al {background:rgba(16,185,129,.08);color:#64d4a8;border:1px solid rgba(16,185,129,.18)}
.dv {background:rgba(239,68,68,.08) ;color:#f87171;border:1px solid rgba(239,68,68,.18)}
.ng {background:rgba(122,146,180,.07);color:var(--muted);border:1px solid var(--border)}

.asummary{font-size:.8rem;color:var(--muted);line-height:1.55;margin-bottom:9px}
.afind{list-style:none;display:flex;flex-direction:column;gap:3px}
.afind li{font-size:.74rem;color:#4d6a86;display:flex;gap:5px;align-items:flex-start}
.afind li::before{content:'·';color:var(--muted);flex-shrink:0}
.ablk{margin-top:8px}
.ablk-i{
  display:flex;gap:6px;align-items:flex-start;
  font-size:.74rem;color:#fca5a5;margin-top:4px;line-height:1.45;
}
.ablk-i::before{content:'✖';flex-shrink:0;font-size:.64rem;margin-top:2px}

/* ── DECISION PANEL ── */
#dec-panel{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;opacity:0;animation:fadeUp .4s .5s forwards;
  box-shadow:0 8px 48px rgba(0,0,0,.55);
}

.dec-top{
  display:grid;grid-template-columns:auto 1fr auto;
  gap:24px;align-items:center;padding:24px 28px;flex-wrap:wrap;
}
.dec-top.PROCEED{background:linear-gradient(135deg,rgba(16,185,129,.06) 0%,transparent 60%)}
.dec-top.CAUTION{background:linear-gradient(135deg,rgba(245,158,11,.06) 0%,transparent 60%)}
.dec-top.DELAY  {background:linear-gradient(135deg,rgba(249,115,22,.06) 0%,transparent 60%)}
.dec-top.BLOCK  {background:linear-gradient(135deg,rgba(239,68,68,.07) 0%,transparent 60%)}

/* radial gauge */
.gauge{position:relative;width:96px;height:96px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg);width:96px;height:96px}
.gtrack{fill:none;stroke:var(--s2);stroke-width:8}
.gfill{
  fill:none;stroke-width:8;stroke-linecap:round;
  stroke-dasharray:263;stroke-dashoffset:263;
  transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1);
}
.gauge-inner{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.g-pct{font-size:1.3rem;font-weight:900;color:var(--text)}
.g-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}

.dec-mid{display:flex;flex-direction:column;gap:8px}
.dec-badge{
  display:inline-flex;align-items:center;
  font-size:.82rem;font-weight:800;letter-spacing:.08em;
  border-radius:8px;padding:5px 14px;align-self:flex-start;
}
.dec-badge.PROCEED{background:rgba(16,185,129,.15);color:#34d399}
.dec-badge.CAUTION{background:rgba(245,158,11,.15);color:#fbbf24}
.dec-badge.DELAY  {background:rgba(249,115,22,.15);color:#fb923c}
.dec-badge.BLOCK  {background:rgba(239,68,68,.15); color:#f87171}
.dec-rec{font-size:.9rem;color:var(--text);line-height:1.6}
.dec-rel{display:flex;align-items:center;gap:10px;font-size:.75rem;color:var(--muted);margin-top:4px}
.rel-track{flex:1;background:var(--s2);border-radius:3px;height:5px;overflow:hidden}
.rel-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--acc2),var(--acc));width:0;transition:width 1s .4s cubic-bezier(.4,0,.2,1)}
.rel-val{font-weight:700;color:var(--text);min-width:34px;text-align:right}

.dec-stats{display:flex;flex-direction:column;gap:6px;min-width:120px}
.stat{display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:.75rem}
.stat-k{color:var(--muted)}
.stat-v{font-weight:700;color:var(--text)}

/* vote breakdown */
.dec-body{
  display:flex;gap:24px;flex-wrap:wrap;
  padding:20px 28px;border-top:1px solid var(--border);
}
.votes{flex:1;min-width:200px}
.votes-lbl{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.vrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vstance{font-size:.72rem;font-weight:800;width:70px}
.vtrack{flex:1;background:var(--s2);border-radius:3px;height:6px;overflow:hidden}
.vfill{height:100%;border-radius:3px;width:0;transition:width .9s .5s cubic-bezier(.4,0,.2,1)}
.vcnt{font-size:.7rem;color:var(--muted);min-width:28px;text-align:right}

.blockers{flex:1.6;min-width:220px}
.blk-lbl{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#f87171;margin-bottom:10px}
.blk-card{
  display:flex;gap:10px;align-items:flex-start;
  background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.13);
  border-radius:8px;padding:9px 13px;margin-bottom:7px;
  font-size:.8rem;color:#fca5a5;line-height:1.5;
}
.blk-card::before{content:'⚠';flex-shrink:0;font-size:.72rem;margin-top:1px}

.dec-foot{
  padding:0 28px 18px;font-size:.74rem;color:var(--muted);
  border-top:1px solid var(--border);padding-top:14px;
}
.dec-foot strong{color:#8fb4ce}

@media(max-width:640px){
  .qrow{flex-direction:column}
  .qside{min-width:unset;flex-direction:row;flex-wrap:wrap}
  .qside select,.qside .btn{flex:1}
  .dec-top{grid-template-columns:1fr;gap:16px}
  .dec-stats{flex-direction:row;flex-wrap:wrap;gap:12px}
}
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="13" r="7" fill="white" opacity=".92"/>
      <path d="M9 19 Q6 24 8 28"    stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
      <path d="M11.5 21 Q11 27 14 29" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
      <path d="M16 22 Q16 27 16 30"  stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
      <path d="M20.5 21 Q21 27 18 29" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
      <path d="M23 19 Q26 24 24 28"  stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
      <circle cx="13.5" cy="12.5" r="1.5" fill="#0ea5e9"/>
      <circle cx="18.5" cy="12.5" r="1.5" fill="#818cf8"/>
    </svg>
  </div>
  <div class="htext">
    <h1>CephMind</h1>
    <p>Six agents <em>challenge each other in parallel.</em> Their disagreements are measured. A consensus <em>emerges with a reliability score</em> — not just an answer.</p>
  </div>
</header>

<!-- QUERY -->
<div class="qbox">
  <div class="qrow">
    <div class="fg">
      <label for="qi">Decision or question</label>
      <textarea id="qi" placeholder="e.g. Should this Oracle ERP migration proceed? UAT incomplete, no rollback plan, go-live in 6 weeks…"></textarea>
    </div>
    <div class="qside">
      <div class="fg">
        <label for="dom">Domain</label>
        <select id="dom">
          <option value="general">General</option>
          <option value="erp">ERP</option>
          <option value="cloud">Cloud</option>
          <option value="finance">Finance</option>
        </select>
      </div>
      <button class="btn" id="go">Analyse →</button>
    </div>
  </div>
  <div class="chips">
    <span>Try:</span>
    <button class="chip" onclick="ex('erp')">ERP migration (risky)</button>
    <button class="chip" onclick="ex('cloud')">Cloud migration (clean)</button>
    <button class="chip" onclick="ex('fin')">Budget approval</button>
    <button class="chip" onclick="ex('con')">Contradictory proposal</button>
  </div>
</div>

<div id="err"></div>

<!-- LOADER -->
<div id="loader">
  <div class="arms">
    <div class="arm"></div><div class="arm"></div><div class="arm"></div><div class="arm"></div>
    <div class="arm"></div><div class="arm"></div><div class="arm"></div><div class="arm"></div>
  </div>
  <p class="loader-t">Agents deliberating…</p>
  <p class="loader-s">Logic · Risk · Domain · Contradiction · Cost · Compliance</p>
</div>

<!-- RESULTS -->
<div id="results">

  <!-- NETWORK -->
  <div class="sec-head"><span>Reasoning Network</span></div>
  <div id="net-panel">
    <div id="net-svg-wrap"></div>
    <div id="dist-strip"></div>
  </div>

  <!-- AGENTS -->
  <div class="sec-head"><span>Agent Deliberation</span></div>
  <div class="grid" id="grid"></div>

  <!-- DECISION -->
  <div class="sec-head"><span>Emergent Decision</span></div>
  <div id="dec-panel"></div>

</div>
</div>

<script>
const SC = {PROCEED:'#10b981',CAUTION:'#f59e0b',DELAY:'#f97316',BLOCK:'#ef4444'};
const EX = {
  erp:{domain:'erp',text:'Should this Oracle ERP migration proceed? The project has a fixed go-live date in 6 weeks. UAT is still incomplete, there is no rollback plan, the budget is over budget by 20%, data migration scripts are untested in production, and we have a dependency on a single legacy interface. GDPR controls are not yet reviewed by the DPO.'},
  cloud:{domain:'cloud',text:'Should we proceed with the AWS cloud migration? All workloads are containerised using Kubernetes. Terraform IaC is in place, CI/CD pipeline tested, blue-green deployment confirmed, DR and failover validated in staging, encryption at rest and in transit enforced, least-privilege IAM policies reviewed. Budget approved and TCO signed off by CFO.'},
  fin:{domain:'finance',text:'Should we approve the $2 million capex for the new data platform? No business case has been prepared, costs are unknown, there is no approved budget, no CFO sign-off, and no ROI model.'},
  con:{domain:'general',text:'We need zero downtime but will perform a complete live migration of all production data. We also need to skip all tests and go directly to production to meet the urgent deadline. The approach must be thorough and comprehensive yet completed by end of day.'},
};
function ex(k){
  document.getElementById('qi').value=EX[k].text;
  document.getElementById('dom').value=EX[k].domain;
}
const pct=n=>Math.round(n*100)+'%';

/* ─── NETWORK SVG ─────────────────────────────────────────────────────── */
function buildNet(verdicts, cStance){
  const W=680, H=390;
  const QX=54, QY=H/2, QR=28;
  const CX=626, CY=H/2, CR=40;
  const AX1=230, AX2=360;
  const n=verdicts.length; // 6
  const ys1=[70,195,320];   // col1 y
  const ys2=[132,257,382];  // col2 y (staggered)

  const aPos = [
    {x:AX1,y:ys1[0]},{x:AX2,y:ys2[0]},
    {x:AX1,y:ys1[1]},{x:AX2,y:ys2[1]},
    {x:AX1,y:ys1[2]},{x:AX2,y:ys2[2]},
  ].slice(0,n);

  const cCol = SC[cStance]||'#7a92b4';
  const AR=22;

  // SVG filters for glow
  let defs=`<defs>
    <filter id="gq" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gc" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  Object.entries(SC).forEach(([s,c])=>{
    defs+=`<filter id="ga-${s}" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  });
  defs+=`</defs>`;

  // dot grid bg
  let bg=`<pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.9" fill="rgba(255,255,255,.04)"/>
  </pattern>
  <rect width="${W}" height="${H}" fill="url(#dots)"/>`;

  let paths='', nodes='', labels='', particles='';

  aPos.forEach((ap,i)=>{
    const v=verdicts[i];
    const col=SC[v.stance]||'#7a92b4';
    const isDis = v.stance!==cStance;
    const opacity= isDis ? '.35' : '.55';
    const dsh = isDis ? 'stroke-dasharray="7 5"' : '';
    const pDelay = 0.1+i*0.1;

    // Q → agent
    const d1=`M${QX+QR},${QY} C${QX+110},${QY} ${ap.x-90},${ap.y} ${ap.x-AR},${ap.y}`;
    const pid1=`pq${i}`;
    paths+=`<path id="${pid1}" class="npath" d="${d1}" stroke="${col}" opacity="${opacity}" ${dsh}
      style="transition-delay:${pDelay}s"/>`;

    // agent → consensus
    const d2=`M${ap.x+AR},${ap.y} C${ap.x+90},${ap.y} ${CX-110},${CY} ${CX-CR},${CY}`;
    const pid2=`pa${i}`;
    paths+=`<path id="${pid2}" class="npath" d="${d2}" stroke="${col}" opacity="${isDis?'.25':'.5'}" ${dsh}
      style="transition-delay:${pDelay+0.3}s"/>`;

    // animated particles (visible path only)
    if(!isDis){
      particles+=`
        <circle r="3" fill="${col}" opacity="0.75">
          <animateMotion dur="${1.8+i*0.3}s" repeatCount="indefinite" begin="${i*0.4}s">
            <mpath href="#${pid1}"/>
          </animateMotion>
        </circle>
        <circle r="3" fill="${col}" opacity="0.65">
          <animateMotion dur="${1.6+i*0.3}s" repeatCount="indefinite" begin="${i*0.4+0.6}s">
            <mpath href="#${pid2}"/>
          </animateMotion>
        </circle>`;
    }

    // agent node
    const short=v.agent_name.replace(' Agent','').replace(' Expert','');
    nodes+=`
      <circle cx="${ap.x}" cy="${ap.y}" r="${AR+6}" fill="${col}" opacity=".07" filter="url(#ga-${v.stance})"/>
      <circle cx="${ap.x}" cy="${ap.y}" r="${AR}" fill="rgba(8,15,34,.85)" stroke="${col}" stroke-width="1.5" opacity=".9"/>
      <circle cx="${ap.x}" cy="${ap.y}" r="5" fill="${col}" opacity=".85"/>`;
    labels+=`<text x="${ap.x}" y="${ap.y-AR-8}" text-anchor="middle"
      fill="${col}" font-size="10.5" font-family="Inter,system-ui,sans-serif"
      font-weight="700" opacity=".85">${short}</text>`;
  });

  // query node
  nodes+=`
    <circle cx="${QX}" cy="${QY}" r="${QR+8}" fill="rgba(56,189,248,.06)" filter="url(#gq)"/>
    <circle cx="${QX}" cy="${QY}" r="${QR}" fill="rgba(8,15,34,.9)" stroke="rgba(56,189,248,.5)" stroke-width="1.8"/>
    <text x="${QX}" y="${QY-4}" text-anchor="middle" fill="#38bdf8" font-size="8.5"
      font-family="Inter,system-ui,sans-serif" font-weight="700">YOUR</text>
    <text x="${QX}" y="${QY+7}" text-anchor="middle" fill="#38bdf8" font-size="8.5"
      font-family="Inter,system-ui,sans-serif" font-weight="700">QUERY</text>`;

  // consensus node
  nodes+=`
    <circle cx="${CX}" cy="${CY}" r="${CR+10}" fill="${cCol}" opacity=".06" filter="url(#gc)"/>
    <circle cx="${CX}" cy="${CY}" r="${CR+4}" fill="${cCol}" opacity=".04"/>
    <circle cx="${CX}" cy="${CY}" r="${CR}" fill="rgba(8,15,34,.9)" stroke="${cCol}" stroke-width="2"/>
    <text x="${CX}" y="${CY-8}" text-anchor="middle" fill="${cCol}" font-size="8.5"
      font-family="Inter,system-ui,sans-serif" font-weight="700">EMERGENT</text>
    <text x="${CX}" y="${CY+4}" text-anchor="middle" fill="${cCol}" font-size="10.5"
      font-family="Inter,system-ui,sans-serif" font-weight="800">${cStance}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${defs}
    ${bg}
    ${paths}
    ${particles}
    ${nodes}
    ${labels}
  </svg>`;
}

/* ─── DISTRIBUTION ─────────────────────────────────────────────────────── */
function buildDist(verdicts, rel){
  const cnt={PROCEED:0,CAUTION:0,DELAY:0,BLOCK:0};
  verdicts.forEach(v=>{if(cnt[v.stance]!==undefined)cnt[v.stance]++});
  const map={PROCEED:'p',CAUTION:'c',DELAY:'d',BLOCK:'b'};
  const strip=document.getElementById('dist-strip');
  strip.innerHTML='';
  ['PROCEED','CAUTION','DELAY','BLOCK'].forEach(s=>{
    if(!cnt[s])return;
    const d=document.createElement('div');
    d.className=`dst ${map[s]}`;
    d.innerHTML=`<div class="dst-dot"></div>
      <div class="dst-info">
        <span class="dst-stance">${s}</span>
        <span class="dst-n">${cnt[s]} agent${cnt[s]>1?'s':''}</span>
      </div>`;
    strip.appendChild(d);
  });
  const hint = rel>=.75?'High agreement':rel>=.5?'Moderate agreement':'Low agreement — scrutinise';
  const rc=document.createElement('div');
  rc.className='rel-callout';
  rc.innerHTML=`<span class="rel-n" id="reln">0%</span>
    <span class="rel-lbl">Reliability</span>
    <span class="rel-hint">${hint}</span>`;
  strip.appendChild(rc);
  // count up animation
  const target=Math.round(rel*100);
  let cur=0;const step=Math.ceil(target/36);
  const iv=setInterval(()=>{
    cur=Math.min(cur+step,target);
    const el=document.getElementById('reln');
    if(el)el.textContent=cur+'%';
    if(cur>=target)clearInterval(iv);
  },24);
}

/* ─── ALIGNMENT ────────────────────────────────────────────────────────── */
function alignInfo(as,cs){
  if(as===cs)return['al','Aligned'];
  const r={PROCEED:0,CAUTION:1,DELAY:2,BLOCK:3};
  return Math.abs(r[as]-r[cs])>=2?['dv','Dissenting']:['ng','Divergent'];
}

/* ─── AGENT CARD ───────────────────────────────────────────────────────── */
function makeCard(v,i,cs){
  const delay=i*.07;
  const c=document.createElement('div');
  c.className='acard';c.dataset.s=v.stance;
  c.style.animationDelay=delay+'s';
  const [ac,at]=alignInfo(v.stance,cs);
  const sClass={PROCEED:'tp',CAUTION:'tc',DELAY:'td',BLOCK:'tb'}[v.stance];
  const pctConf=v.confidence;
  const circ=125.6;
  const off=circ*(1-pctConf);
  const finds=v.findings.map(f=>`<li>${f}</li>`).join('');
  const blks=v.blockers.map(b=>`<div class="ablk-i">${b}</div>`).join('');
  c.innerHTML=`
    <div class="acard-top">
      <div>
        <div class="aname">${v.agent_name}</div>
        <div class="tags">
          <span class="tag ${sClass}">${v.stance}</span>
          <span class="abadge ${ac}">${at}</span>
        </div>
      </div>
      <div class="cconf">
        <svg viewBox="0 0 52 52" width="52" height="52">
          <circle class="cconf-track" cx="26" cy="26" r="20"/>
          <circle class="cconf-fill" cx="26" cy="26" r="20"
            style="stroke-dashoffset:${circ};" data-off="${off}"/>
        </svg>
        <div class="cconf-text">
          <span class="cconf-pct">${Math.round(pctConf*100)}%</span>
          <span class="cconf-sub">conf</span>
        </div>
      </div>
    </div>
    <p class="asummary">${v.summary}</p>
    ${finds?`<ul class="afind">${finds}</ul>`:''}
    ${blks?`<div class="ablk">${blks}</div>`:''}`;
  return c;
}

/* ─── DECISION PANEL ──────────────────────────────────────────────────── */
function buildDec(data){
  const c=data.consensus,s=c.overall_stance,col=SC[s]||'#7a92b4';
  const total=data.verdicts.length;
  const cnt={PROCEED:0,CAUTION:0,DELAY:0,BLOCK:0};
  data.verdicts.forEach(v=>{if(cnt[v.stance]!==undefined)cnt[v.stance]++});
  const cf=Math.round(c.confidence_score*100);
  const circ=263, off=circ*(1-c.confidence_score);
  const sMap={PROCEED:'tp',CAUTION:'tc',DELAY:'td',BLOCK:'tb'};

  const vrows=['PROCEED','CAUTION','DELAY','BLOCK'].filter(x=>cnt[x]>0).map(x=>{
    const w=Math.round(cnt[x]/total*100);
    return `<div class="vrow">
      <span class="vstance" style="color:${SC[x]}">${x}</span>
      <div class="vtrack"><div class="vfill" data-w="${w}" style="background:${SC[x]}"></div></div>
      <span class="vcnt">${cnt[x]}/${total}</span>
    </div>`;
  }).join('');

  const bhtml=c.major_blockers.length
    ?`<div class="blockers">
        <div class="blk-lbl">Critical Blockers</div>
        ${c.major_blockers.map(b=>`<div class="blk-card">${b}</div>`).join('')}
      </div>` : '';

  const dis=c.dissenting_agents.length
    ?`<div class="dec-foot">Agents that diverged from consensus: <strong>${c.dissenting_agents.join(', ')}</strong></div>`:'';

  document.getElementById('dec-panel').innerHTML=`
    <div class="dec-top ${s}">
      <div class="gauge">
        <svg viewBox="0 0 96 96">
          <circle class="gtrack" cx="48" cy="48" r="42"/>
          <circle class="gfill" cx="48" cy="48" r="42"
            style="stroke:${col};stroke-dashoffset:${circ};" data-off="${off}"/>
        </svg>
        <div class="gauge-inner">
          <span class="g-pct">${cf}%</span>
          <span class="g-lbl">conf</span>
        </div>
      </div>
      <div class="dec-mid">
        <span class="dec-badge ${s}">${s}</span>
        <p class="dec-rec">${c.recommendation}</p>
        <div class="dec-rel">
          <span>Reliability</span>
          <div class="rel-track"><div class="rel-fill" data-w="${Math.round(data.reliability_score*100)}"></div></div>
          <span class="rel-val">${pct(data.reliability_score)}</span>
        </div>
      </div>
      <div class="dec-stats">
        <div class="stat"><span class="stat-k">Agents</span><span class="stat-v">${total} reasoned</span></div>
        <div class="stat"><span class="stat-k">Agreement</span><span class="stat-v">${pct(data.reliability_score)}</span></div>
        <div class="stat"><span class="stat-k">Blockers</span><span class="stat-v">${c.major_blockers.length}</span></div>
      </div>
    </div>
    <div class="dec-body">
      <div class="votes">
        <div class="votes-lbl">Vote Breakdown</div>
        ${vrows}
      </div>
      ${bhtml}
    </div>
    ${dis}`;
}

/* ─── ANIMATE ─────────────────────────────────────────────────────────── */
function animate(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.npath').forEach(p=>p.classList.add('lit'));
    document.querySelectorAll('.cconf-fill').forEach(el=>{el.style.strokeDashoffset=el.dataset.off});
    document.querySelectorAll('.gfill').forEach(el=>{el.style.strokeDashoffset=el.dataset.off});
    document.querySelectorAll('.vfill').forEach(el=>{el.style.width=el.dataset.w+'%'});
    document.querySelectorAll('.rel-fill').forEach(el=>{el.style.width=el.dataset.w+'%'});
  });
}

/* ─── MAIN ─────────────────────────────────────────────────────────────── */
async function run(){
  const text=document.getElementById('qi').value.trim();
  const domain=document.getElementById('dom').value;
  if(!text)return;
  const btn=document.getElementById('go');
  const loader=document.getElementById('loader');
  const results=document.getElementById('results');
  const err=document.getElementById('err');
  btn.disabled=true;loader.classList.add('on');
  results.classList.remove('on');err.classList.remove('on');
  document.getElementById('grid').innerHTML='';
  try{
    const res=await fetch('/api/reason',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,domain}),
    });
    if(!res.ok){const e=await res.json().catch(()=>({detail:'Unknown error'}));throw new Error(e.detail||res.statusText)}
    const data=await res.json();
    const cs=data.consensus.overall_stance;
    // network
    document.getElementById('net-svg-wrap').innerHTML=buildNet(data.verdicts,cs);
    // dist
    buildDist(data.verdicts,data.reliability_score);
    // cards
    const g=document.getElementById('grid');
    data.verdicts.forEach((v,i)=>g.appendChild(makeCard(v,i,cs)));
    // decision
    buildDec(data);
    results.classList.add('on');
    setTimeout(animate,80);
  }catch(e){
    err.textContent='Error: '+e.message;err.classList.add('on');
  }finally{
    loader.classList.remove('on');btn.disabled=false;
  }
}
document.getElementById('go').addEventListener('click',run);
document.getElementById('qi').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))run()});
</script>
